# Слой 3 — библиотека шаблонов интерпретации.
# Никакой свободной ИИ-генерации: JSON-ключ из слоя 1 -> готовый текст.
# Словарь бренда обязателен: период, цикл, фон, качество.
# Запрещено: судьба, предсказание, гадание, гороскоп, опасный день.
# Тексты — черновые заглушки под структуру. Финальные пишет владелец.

# --- Махадаша: фон периода (9, по управителю) ---
mahadasha:
  ketu:    { short: "фон отпускания и завершений",   full: "Долгий цикл, в котором старое теряет вес, а новое ещё не оформилось. Хорошее время разбирать накопленное, а не строить с нуля." }
  venus:   { short: "фон связей и вкуса",            full: "Период про отношения, ценность, комфорт и то, что приносит удовольствие. Ресурс приходит через людей и через красоту сделанного." }
  sun:     { short: "фон опоры на себя",             full: "Цикл про центр, ответственность и собственную роль. Заметнее становятся вопросы статуса и того, за что вы отвечаете." }
  moon:    { short: "фон настроения и заботы",       full: "Период с высокой чувствительностью к среде и людям. Важнее обычного — дом, покой, ритм и внутреннее состояние." }
  mars:    { short: "фон действия и границ",         full: "Цикл про энергию, инициативу и защиту своего. Много топлива, но и выше цена спешки — движение важнее рывка." }
  rahu:    { short: "фон роста и непривычного",      full: "Период, который тянет за пределы освоенного: новые среды, амбиции, нестандартные ходы. Правила прежнего этапа работают хуже." }
  jupiter: { short: "фон смысла и расширения",       full: "Цикл про обучение, опору на принципы и рост через понимание. Хорошее окно для того, что складывается вдолгую." }
  saturn:  { short: "фон структуры и выдержки",      full: "Период про дисциплину, сроки и работу вдолгую. Медленнее, но устойчивее — то, что строится сейчас, держится." }
  mercury: { short: "фон обмена и расчёта",          full: "Цикл про информацию, связи, тексты и договорённости. Ум подвижен, важно не распыляться между многим." }

# --- Антардаша: фон подпериода (9, по управителю) ---
antardasha:
  ketu:    { short: "подпериод тишины",       full: "Внутри большого цикла — участок, где хочется меньше внешнего и больше своего. Нормально сбавить обороты." }
  venus:   { short: "подпериод сближения",    full: "Акцент смещается к людям, комфорту и приятному. Хорошее окно для отношений и восстановления ресурса." }
  sun:     { short: "подпериод видимости",    full: "Ваша роль и ответственность выходят на первый план. Заметнее вопросы признания и позиции." }
  moon:    { short: "подпериод чувств",        full: "Выше чувствительность к среде и настроению. Опирайтесь на ритм и заботу о себе." }
  mars:    { short: "подпериод инициативы",    full: "Прибавляется энергии и желания действовать. Держите темп ровным, без рывков." }
  rahu:    { short: "подпериод нового",        full: "Тянет к непривычному и к росту. Прежние схемы работают слабее обычного." }
  jupiter: { short: "подпериод опоры",         full: "Хорошее окно для решений вдолгую и для того, что даёт смысл." }
  saturn:  { short: "подпериод работы",        full: "Про дисциплину и терпение. Результат приходит через выдержку, а не через скорость." }
  mercury: { short: "подпериод связей",        full: "Много обмена, текстов и договорённостей. Полезно навести порядок в делах и контактах." }

# --- Бейдж оценки дня (4 градации) ---
badge:
  active:  "активный ясный фон"
  working: "спокойный рабочий фон"
  calm:    "ровный спокойный фон"
  gentle:  "бережный фон дня"

# --- Тара дня: одно-два слова (9 тар) ---
tara_word:
  1: "начало"       # Джанма
  2: "поддержка"    # Сампат
  3: "препятствие"  # Випат
  4: "устойчивость" # Кшема
  5: "сопротивление"# Пратьяк
  6: "движение"     # Садхана
  7: "трение"       # Вадха
  8: "союзник"      # Митра
  9: "опора"        # Парама-митра

# --- «В потоке сегодня» (по градации) ---
in_flow:
  active:
    - "день держит темп — можно браться за важное"
    - "хорошее окно для дел, где нужна ясность"
  working:
    - "ровный фон для рабочих задач без перегруза"
    - "спокойно двигаться по плану, без резких ходов"
  calm:
    - "подходит для рутины и того, что давно откладывали"
    - "мягкий день для восстановления и порядка в делах"
  gentle:
    - "лучше про отдых и заботу, чем про новые старты"
    - "день, чтобы сбавить темп и не гнать себя"

# --- «С осторожностью» (по градации) ---
with_care:
  active:
    - "не путайте энергию со спешкой в важных решениях"
    - "много топлива — легко взять лишнего на себя"
  working:
    - "не перегружайте день второстепенным"
    - "держите одну-две главные задачи, не больше"
  calm:
    - "не ждите от себя рывков, темп сегодня мягкий"
    - "крупные старты лучше отложить на более активный день"
  gentle:
    - "не назначайте на сегодня тяжёлых разговоров"
    - "поберегите силы, важное перенесите на активный день"
