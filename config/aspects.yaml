# Джйотишевские аспекты (граха-дришти). Счёт ПО ЗНАКАМ от занятого знака,
# 7-й = напротив. Правится без деплоя (как коэффициенты оценки).
#
# Принцип: все планеты дают полный аспект на 7-й знак от себя.
# Спец-аспекты (дополнительно к 7-му):
special:
  Ma: [4, 8]     # Марс
  Ju: [5, 9]     # Юпитер
  Sa: [3, 10]    # Сатурн

# Узлы — трактовка зависит от школы. По умолчанию только 7-й, как у прочих.
# Если школа даёт узлам аспект как у Юпитера (5/9) — впиши сюда [5, 9].
nodes_special:
  Ra: []
  Ke: []

seventh_all: true       # все планеты дают полный аспект на 7-й
show_conjunction: true  # показывать соединения (планеты в одном знаке)
