# Коэффициенты оценки дня.
# Вынесено в конфиг намеренно (ТЗ, раздел 7): правка без деплоя.
# Значения подтвердить у владельца (школа Шлеенкова) — см. открытый вопрос
# про трактовку 6-й позиции Чандра-балы.

ayanamsha: lahiri      # зафиксировано в конфиге (Swiss Ephemeris SIDM_LAHIRI)
zodiac: sidereal
day_point: noon        # точка расчёта дня: noon | sunrise (методология за владельцем)

# Оценка дня (0-100) = chandra_bala * weight.chandra + tara_bala * weight.tara
weights:
  chandra: 0.6
  tara: 0.4

# Чандра-бала: позиция транзитной Луны от натальной (1..12) -> балл
chandra_bala:
  1: 100
  2: 60
  3: 100
  4: 20
  5: 60
  6: 100    # 6-я благоприятна в транзите Луны (упастхана); при иной трактовке школы — поправить здесь
  7: 100
  8: 20
  9: 60
  10: 100
  11: 100
  12: 20

# Тара-бала: 9 тар от накшатры рождения -> балл
tara_bala:
  1: 50     # Джанма
  2: 100    # Сампат
  3: 0      # Випат
  4: 100    # Кшема
  5: 50     # Пратьяк
  6: 100    # Садхана
  7: 0      # Вадха
  8: 100    # Митра
  9: 100    # Парама-митра

# Маппинг итогового балла в градацию (цвет + код бейджа).
# Принципиально: нижняя градация — «бережный», не «плохой». Никаких красных дней.
grades:
  - { min: 80, max: 100, code: active,  color: "#0F6E56", label: "активный" }
  - { min: 60, max: 79,  code: working, color: "#534AB7", label: "рабочий" }
  - { min: 40, max: 59,  code: calm,    color: "#7FB59B", label: "спокойный" }
  - { min: 0,  max: 39,  code: gentle,  color: "#854F0B", label: "бережный" }
